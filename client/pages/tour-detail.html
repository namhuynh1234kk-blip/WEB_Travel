<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chi tiết tour</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-100">

   <div id="tour-detail"></div>

<!-- BOOKING MODAL -->
<div
    id="booking-modal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">

    <div class="bg-white rounded-3xl p-8 w-full max-w-lg">

        <div class="flex items-center justify-between mb-6">

            <h2 class="text-3xl font-bold">
                Đặt Tour
            </h2>

            <button onclick="closeBookingModal()">
                ✕
            </button>

        </div>

        <form id="booking-form" class="space-y-5">

            <input
                type="text"
                id="full_name"
                placeholder="Họ tên"
                class="w-full border rounded-2xl px-5 py-4">

            <input
                type="text"
                id="phone"
                placeholder="Số điện thoại"
                class="w-full border rounded-2xl px-5 py-4">

            <input
                type="number"
                id="people_count"
                placeholder="Số người"
                class="w-full border rounded-2xl px-5 py-4">

            <textarea
                id="note"
                placeholder="Ghi chú"
                class="w-full border rounded-2xl px-5 py-4 h-32"></textarea>

            <button
                class="w-full bg-teal-700 text-white py-4 rounded-2xl">

                Xác nhận đặt tour

            </button>

        </form>

    </div>

</div>

    <script src="../js/tour-detail.js"></script>

</body>

</html>
