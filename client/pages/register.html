<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng ký</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">

        <h1 class="text-4xl font-bold mb-8 text-center">
            Đăng ký
        </h1>

        <form id="register-form" class="space-y-5">

            <input
                type="text"
                id="name"
                placeholder="Họ tên"
                class="w-full border rounded-2xl px-5 py-4 outline-none">

            <input
                type="email"
                id="email"
                placeholder="Email"
                class="w-full border rounded-2xl px-5 py-4 outline-none">

            <input
                type="password"
                id="password"
                placeholder="Mật khẩu"
                class="w-full border rounded-2xl px-5 py-4 outline-none">

            <button
                class="w-full bg-teal-700 text-white py-4 rounded-2xl hover:bg-teal-800 transition">

                Đăng ký

            </button>

        </form>

        <p class="text-center mt-6 text-zinc-600">

            Đã có tài khoản?

            <a href="./login.html"
               class="text-teal-700 font-semibold">

               Đăng nhập

            </a>

        </p>

    </div>

    <script src="../js/register.js"></script>

</body>

</html>
